name: Cloud Android VPS

on:
  workflow_dispatch:

jobs:
  cloud-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------
      # SYSTEM SETUP
      # ------------------------------------------------

      - name: Install desktop
        run: |
          sudo apt update

          sudo apt install -y \
            xfce4 \
            xfce4-goodies \
            xvfb \
            x11vnc \
            novnc \
            websockify \
            wget \
            curl \
            unzip \
            git \
            htop \
            nano \
            neofetch \
            net-tools

      # ------------------------------------------------
      # START DESKTOP
      # ------------------------------------------------

      - name: Start virtual desktop
        run: |
          export DISPLAY=:1

          Xvfb :1 -screen 0 1920x1080x24 &

          sleep 2

          startxfce4 &

          sleep 10

      # ------------------------------------------------
      # START VNC
      # ------------------------------------------------

      - name: Start VNC server
        run: |
          export DISPLAY=:1

          x11vnc \
            -display :1 \
            -forever \
            -shared \
            -nopw \
            -listen localhost &

      # ------------------------------------------------
      # START NOVNC
      # ------------------------------------------------

      - name: Start noVNC
        run: |
          websockify \
            --web=/usr/share/novnc/ \
            6080 localhost:5900 &

      # ------------------------------------------------
      # INSTALL CLOUDFLARE TUNNEL
      # ------------------------------------------------

      - name: Install cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb

          sudo dpkg -i cloudflared-linux-amd64.deb

      # ------------------------------------------------
      # EXPOSE DESKTOP
      # ------------------------------------------------

      - name: Expose noVNC publicly
        run: |
          cloudflared tunnel \
            --url http://localhost:6080 \
            > novnc.log 2>&1 &

          sleep 15

          echo "=============================="
          echo "OPEN THIS URL IN BROWSER:"
          echo "=============================="

          grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare.com' novnc.log

          echo "=============================="

      # ------------------------------------------------
      # OPTIONAL SSH ACCESS
      # ------------------------------------------------

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      # ------------------------------------------------
      # KEEP MACHINE ALIVE
      # ------------------------------------------------

      - name: Keep runner alive
        run: |
          echo "Machine is now acting like temporary VPS"

          while true; do
            echo "still alive $(date)"
            sleep 60
          done
